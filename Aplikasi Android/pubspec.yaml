name: lpg_monitor
description: Aplikasi monitoring dan kontrol deteksi kebocoran gas LPG dengan Random Forest

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.5.1
  fl_chart: ^0.71.0
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  line_awesome_flutter: ^2.0.0
  flutter_foreground_task: ^9.2.0
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 

flutter_launcher_icons:            
  android: true
  ios: true
  image_path: "assets/icons/icon_apk.png"
  adaptive_icon_background: "#07101F"
  adaptive_icon_foreground: "assets/icons/icon_apk.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700